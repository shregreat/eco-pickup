<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Requests | EcoPickup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/dashboard.css" />
  </head>
  <body data-role="admin" data-page="admin-requests">
    <div class="dashboard-shell">
      <header class="dashboard-navbar">
        <a class="dashboard-brand" href="/" aria-label="EcoPickup home">
          <span class="dashboard-brand-mark">E</span>
          <div>
            <strong>EcoPickup</strong>
            <div class="dashboard-role-badge">Admin Requests</div>
          </div>
        </a>

        <nav class="dashboard-nav" aria-label="Admin request navigation">
          <a class="active" href="/admin/requests/">Requests</a>
          <button class="dashboard-logout" id="dashboard-logout" type="button">Logout</button>
        </nav>
      </header>

      <main class="dashboard-main">
        <header class="dashboard-topbar">
          <div class="topbar-copy">
            <p>Admin requests view</p>
            <h1>All requests</h1>
          </div>
          <div class="topbar-meta">
            <div class="topbar-date">
              <span>Today</span>
              <strong id="dashboard-date"></strong>
            </div>
            <div class="topbar-user">
              <span id="dashboard-user-role"></span>
              <strong id="dashboard-user-name"></strong>
            </div>
          </div>
        </header>

        <section class="dashboard-section">
          <article class="card">
            <div class="section-heading">
              <div>
                <h2>All Requests</h2>
                <p>This page loads all requests visible to admins only.</p>
              </div>
            </div>

            <table class="table-shell">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Description</th>
                  <th>Area</th>
                  <th>Status</th>
                  <th>Assigned</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="admin-requests-table-body">
                <tr>
                  <td colspan="5">Loading all requests...</td>
                </tr>
              </tbody>
            </table>

            <p id="page-status-message" class="form-status" aria-live="polite"></p>
          </article>
        </section>
      </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/request-pages.js"></script>
  </body>
</html>
