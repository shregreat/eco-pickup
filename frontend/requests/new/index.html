<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Request | EcoPickup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/dashboard.css" />
  </head>
  <body data-role="user" data-page="new-request">
    <div class="dashboard-shell">
      <header class="dashboard-navbar">
        <a class="dashboard-brand" href="/" aria-label="EcoPickup home">
          <span class="dashboard-brand-mark">E</span>
          <div>
            <strong>EcoPickup</strong>
            <div class="dashboard-role-badge">User Dashboard</div>
          </div>
        </a>

        <nav class="dashboard-nav" aria-label="User navigation">
          <a class="active" href="/requests/new/">New Request</a>
          <a href="/requests/my/">My Requests</a>
          <button class="dashboard-logout" id="dashboard-logout" type="button">Logout</button>
        </nav>
      </header>

      <main class="dashboard-main">
        <header class="dashboard-topbar">
          <div class="topbar-copy">
            <p>Request submission</p>
            <h1>Create a new request</h1>
          </div>
          <div class="topbar-meta">
            <div class="topbar-date">
              <span>Today</span>
              <strong id="dashboard-date"></strong>
            </div>
            <div class="topbar-user">
              <span id="dashboard-user-role"></span>
              <strong id="dashboard-user-name"></strong>
            </div>
          </div>
        </header>

        <section class="dashboard-section">
          <article class="card">
            <div class="section-heading">
              <div>
                <h2>Create Request</h2>
                <p>Submit description, location, and optional image URL using your stored token.</p>
              </div>
            </div>

            <form id="new-request-form" class="dashboard-form">
              <label for="request-description">Request type or description</label>
              <input
                id="request-description"
                name="description"
                type="text"
                placeholder="Household pickup, overflow dustbin, recycling pickup..."
                required
              />

              <label for="request-location">Location</label>
              <div style="display: flex; gap: 8px;">
                <input
                  id="request-location"
                  name="location"
                  type="text"
                  placeholder="Enter the area, street, or landmark"
                  required
                  style="flex: 1;"
                />
                <button type="button" id="get-location-btn" class="dashboard-secondary-button" style="padding: 0 16px; font-size: 14px;" title="Use GPS Location">
                  📍 Get GPS
                </button>
              </div>

              <label for="request-image">Upload Image (Optional)</label>
              <input
                id="request-image"
                name="image"
                type="file"
                accept="image/*"
              />

              <div class="dashboard-action-row">
                <button type="submit" class="dashboard-submit-button">Submit Request</button>
                <a class="dashboard-secondary-button" href="/requests/my/">Open My Requests</a>
              </div>
            </form>

            <p id="page-status-message" class="form-status" aria-live="polite"></p>
          </article>
        </section>
      </main>
    </div>

    <script src="/request-pages.js"></script>
  </body>
</html>
